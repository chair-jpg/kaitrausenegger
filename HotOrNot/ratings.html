<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratings Leaderboard</title>
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <link rel="alternate icon" href="../favicon.png" type="image/png">
    <script src="db.js"></script>
    <style>
        body {
            margin: 0;
            padding: 80px 40px;
            background-color: #fff;
            color: #222;
            font-family: "Times New Roman", Times, serif;
            font-size: 16px;
        }

        .header-star {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            z-index: 1000;
        }

        .header-star img {
            width: 100%;
            height: 100%;
            animation: rotate-star 5.2s linear infinite;
        }

        @keyframes rotate-star {
            from {
                transform: rotateY(0deg);
            }

            to {
                transform: rotateY(360deg);
            }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            font-size: 24px;
            font-weight: normal;
            margin: 0 0 50px 0;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            margin-top: 20px;
        }

        th,
        td {
            padding: 15px 10px;
            border-bottom: 1px solid #ddd;
        }

        th {
            font-weight: normal;
            font-size: 12px;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .col-title {
            width: 35%;
        }

        th[data-sort] {
            cursor: pointer;
            user-select: none;
            position: relative;
        }

        th[data-sort]:hover {
            color: #333;
            text-decoration: underline;
        }

        th[data-sort]::after {
            content: '↕';
            margin-left: 5px;
            font-size: 10px;
            color: #ccc;
        }

        th[data-sort].sort-asc::after {
            content: '↑';
            color: #222;
        }

        th[data-sort].sort-desc::after {
            content: '↓';
            color: #222;
        }

        .score {
            font-family: monospace;
            font-size: 16px;
            text-align: center;
        }

        th.score {
            text-align: center;
        }

        .score-main {
            font-weight: bold;
            font-size: 18px;
            color: #000;
            text-align: center;
        }

        .show-title {
            font-size: 18px;
        }

        .show-title a {
            color: inherit;
            text-decoration: none;
        }

        .show-title a:hover {
            text-decoration: underline;
        }

        .vote-count {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
            display: block;
            font-family: monospace;
        }

        @media (max-width: 800px) {

            table,
            thead,
            tbody,
            th,
            td,
            tr {
                display: block;
            }

            thead tr {
                position: absolute;
                top: -9999px;
                left: -9999px;
            }

            tr {
                border: 1px solid #ccc;
                margin-bottom: 20px;
                padding: 10px;
            }

            td {
                border: none;
                position: relative;
                padding-left: 50%;
                text-align: right;
            }

            td:before {
                position: absolute;
                top: 15px;
                left: 10px;
                width: 45%;
                padding-right: 10px;
                white-space: nowrap;
                text-align: left;
                font-size: 12px;
                color: #777;
                text-transform: uppercase;
            }

            td:nth-of-type(1):before {
                content: "Show";
            }

            td:nth-of-type(2):before {
                content: "Overall Avg";
            }

            td:nth-of-type(3):before {
                content: "Satisfaction";
            }

            td:nth-of-type(4):before {
                content: "Relevance";
            }

            td:nth-of-type(5):before {
                content: "Instagramable";
            }

            td:nth-of-type(6):before {
                content: "Sellable";
            }

            td:nth-of-type(7):before {
                content: "Cool";
            }

            td.col-title,
            td.score,
            td.score-main {
                text-align: right;
                width: auto;
                padding-left: 50%;
            }

            .show-title {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
    <a href="star.html" class="header-star">
        <img src="star.png" alt="Star">
    </a>

    <div class="container">
        <h1></h1>
        <table>
            <thead>
                <tr>
                    <th class="col-title" data-sort="title">Show</th>
                    <th class="score-main" data-sort="overall">Overall ★</th>
                    <th class="score" data-sort="satisfaction">Satis.</th>
                    <th class="score" data-sort="relevance">Relev.</th>
                    <th class="score" data-sort="instagramable">Insta.</th>
                    <th class="score" data-sort="sellable">Sell.</th>
                    <th class="score" data-sort="cool">Cool</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody">
                <!-- Rows injected via JS -->
            </tbody>
        </table>
    </div>

    <script>
        let currentData = [];
        let currentSort = { column: 'overall', desc: true };

        function renderStars(rating) {
            const val = parseFloat(rating);
            let html = '';
            for (let i = 1; i <= 5; i++) {
                if (val >= i) {
                    html += '<span style="color:#FFD700;">★</span>';
                } else if (val >= i - 0.5) {
                    // Half star via CSS clip
                    html += '<span style="position:relative;display:inline-block;color:#ddd;">★<span style="position:absolute;left:0;top:0;overflow:hidden;width:50%;color:#FFD700;">★</span></span>';
                } else {
                    html += '<span style="color:#ddd;">★</span>';
                }
            }
            return html;
        }

        function renderTable() {
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = '';

            if (currentData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 40px;">No shows recorded yet.</td></tr>';
                return;
            }

            // Sort logic
            const sortedData = [...currentData].sort((a, b) => {
                const col = currentSort.column;
                
                // Keep 0-vote shows at the very bottom
                if (a.count === 0 && b.count > 0) return 1;
                if (b.count === 0 && a.count > 0) return -1;
                if (a.count === 0 && b.count === 0) return 0;

                let valA, valB;
                if (col === 'title') {
                    valA = a.title.toLowerCase();
                    valB = b.title.toLowerCase();
                } else if (col === 'overall') {
                    valA = parseFloat(a.overallAvg) || 0;
                    valB = parseFloat(b.overallAvg) || 0;
                } else {
                    valA = parseFloat(a.averages ? a.averages[col] : 0) || 0;
                    valB = parseFloat(b.averages ? b.averages[col] : 0) || 0;
                }

                if (valA < valB) return currentSort.desc ? 1 : -1;
                if (valA > valB) return currentSort.desc ? -1 : 1;
                return 0;
            });

            // Visual header update
            document.querySelectorAll('th[data-sort]').forEach(th => {
                th.className = th.className.replace(/sort-asc|sort-desc/g, '').trim();
                let baseClasses = th.dataset.sort === 'title' ? 'col-title' : (th.dataset.sort === 'overall' ? 'score-main' : 'score');
                if (th.dataset.sort === currentSort.column) {
                    baseClasses += currentSort.desc ? ' sort-desc' : ' sort-asc';
                }
                th.className = baseClasses;
            });

            // Render Rows
            sortedData.forEach(show => {
                const tr = document.createElement('tr');
                if (show.count === 0) {
                    tr.innerHTML = `
                        <td class="col-title">
                            <div class="show-title"><a href="tierlist.html?token=${show.token}">${show.title}</a></div>
                            <span class="vote-count">0 votes</span>
                        </td>
                        <td class="score-main"><span style="color:#ddd;font-size:22px;">★★★★★</span></td>
                        <td class="score">-</td>
                        <td class="score">-</td>
                        <td class="score">-</td>
                        <td class="score">-</td>
                        <td class="score">-</td>
                    `;
                } else {
                    tr.innerHTML = `
                        <td class="col-title">
                            <div class="show-title"><a href="tierlist.html?token=${show.token}">${show.title}</a></div>
                            <span class="vote-count">${show.count} vote${show.count > 1 ? 's' : ''}</span>
                        </td>
                        <td class="score-main"><span style="font-size:22px;letter-spacing:2px;">${renderStars(show.overallAvg)}</span><br><span style="font-size:11px;color:#999;">${show.overallAvg}/5</span></td>
                        <td class="score">${show.averages.satisfaction}</td>
                        <td class="score">${show.averages.relevance}</td>
                        <td class="score">${show.averages.instagramable}</td>
                        <td class="score">${show.averages.sellable}</td>
                        <td class="score">${show.averages.cool}</td>
                    `;
                }
                tbody.appendChild(tr);
            });
        }

        function handleSort(column) {
            if (currentSort.column === column) {
                currentSort.desc = !currentSort.desc;
            } else {
                currentSort.column = column;
                currentSort.desc = true;
            }
            renderTable();
        }

        document.addEventListener('DOMContentLoaded', () => {
            currentData = window.DB.getShowAverages();
            
            document.querySelectorAll('th[data-sort]').forEach(th => {
                th.addEventListener('click', () => {
                    handleSort(th.dataset.sort);
                });
            });

            renderTable();
        });
    </script>
</body>

</html>
